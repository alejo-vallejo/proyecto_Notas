services:
  db:
    image: postgres:16
    container_name: notas_db
    environment:
      POSTGRES_DB: notas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/database.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
