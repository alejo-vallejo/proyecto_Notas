<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Nota</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 350px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }

        button {
            background-color: blue;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }

        a {
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <h1>Crear Nota</h1>

    <form id="formNota">
        <input type="text" id="titulo" placeholder="Titulo" required>
        <textarea id="contenido" placeholder="Contenido" required></textarea>
        <button type="submit">Guardar Nota</button>
    </form>

    <a href="ver.html">Ver Notas</a>

    <!-- SCRIPT -->
    <script>
        const form = document.getElementById('formNota');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const titulo = document.getElementById('titulo').value;
            const contenido = document.getElementById('contenido').value;

            // ✔ validación básica (punto del proyecto)
            if (!titulo || !contenido) {
                alert("Todos los campos son obligatorios");
                return;
            }

            const nota = {
                titulo,
                contenido
            };

            console.log("📤 Enviando nota:", nota);

            try {
                const respuesta = await fetch('http://127.0.0.1:8000/notas', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(nota)
                });

                const data = await respuesta.json();

                console.log("📥 Respuesta backend:", data);

                if (respuesta.ok) {
                    alert("✅ Nota guardada correctamente");
                    form.reset();
                } else {
                    alert("❌ Error: " + data.detail);
                }

            } catch (error) {
                console.log("❌ Error de conexión:", error);
                alert("No se pudo conectar con el backend");
            }
        });
    </script>

</body>
</html>
