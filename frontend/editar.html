<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Nota</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Editar Nota</h1>
        <div id="alertContainer"></div>

        <div class="card">
            <form id="formEditar">
                <div class="form-group">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" placeholder="Título de la nota" required>
                </div>
                <div class="form-group">
                    <label for="contenido">Contenido</label>
                    <textarea id="contenido" placeholder="Escribe tu nota aquí..." required></textarea>
                </div>
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <button type="submit" class="btn btn-primary">Actualizar Nota</button>
                    <button type="button" class="btn btn-ia" id="btnMejorarIA">Mejorar con IA</button>
                </div>
            </form>
        </div>

        <div class="nav">
            <a href="ver.html" class="btn btn-outline">Ver Notas</a>
            <a href="index.html" class="btn btn-outline">Crear Nota</a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const notaId = params.get('id');
        const form = document.getElementById('formEditar');
        const tituloInput = document.getElementById('titulo');
        const contenidoInput = document.getElementById('contenido');
        const btnMejorar = document.getElementById('btnMejorarIA');

        if (!notaId) {
            showAlert('ID de nota no proporcionado', 'error');
        }

        async function cargarNota() {
            try {
                const nota = await apiRequest(`/notas/${notaId}`);
                tituloInput.value = nota.titulo;
                contenidoInput.value = nota.contenido;
            } catch (error) {
                showAlert('Error al cargar la nota: ' + error.message, 'error');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const titulo = tituloInput.value.trim();
            const contenido = contenidoInput.value.trim();

            if (!titulo || !contenido) {
                showAlert('Todos los campos son obligatorios', 'error');
                return;
            }

            try {
                await apiRequest(`/notas/${notaId}`, {
                    method: 'PUT',
                    body: JSON.stringify({ titulo, contenido })
                });
                showAlert('Nota actualizada correctamente');
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        });

        btnMejorar.addEventListener('click', async () => {
            const texto = contenidoInput.value.trim();
            if (!texto) {
                showAlert('Escribe algo en el contenido primero', 'error');
                return;
            }

            btnMejorar.disabled = true;
            btnMejorar.textContent = 'Mejorando...';

            try {
                const result = await apiRequest('/ia', {
                    method: 'POST',
                    body: JSON.stringify({ texto })
                });
                contenidoInput.value = result.texto_mejorado;
                showAlert('Texto mejorado con IA');
            } catch (error) {
                showAlert('Error al mejorar con IA: ' + error.message, 'error');
            } finally {
                btnMejorar.disabled = false;
                btnMejorar.textContent = 'Mejorar con IA';
            }
        });

        window.onload = cargarNota;
    </script>
</body>
</html>
