<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ver Notas</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        #listaNotas {
            margin-top: 20px;
        }

        .nota {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        a {
            display: inline-block;
            margin-top: 15px;
        }
    </style>

</head>
<body>

    <h1>Lista de Notas</h1>

    <div id="listaNotas">
        <p>Cargando notas...</p>
    </div>

    <a href="index.html">Crear Nota</a>

    <!-- SCRIPT -->
    <script>
    async function cargarNotas() {
        try {
            const respuesta = await fetch('http://127.0.0.1:8000/notas');
            const notas = await respuesta.json();

            const contenedor = document.getElementById('listaNotas');
            contenedor.innerHTML = "";

            notas.forEach(n => {
                const div = document.createElement('div');
                div.className = "nota";

                div.innerHTML = `
                    <h3>${n.titulo}</h3>
                    <p>${n.contenido}</p>
                `;

                contenedor.appendChild(div);
            });

        } catch (error) {
            console.log("Error:", error);
        }
    }

    window.onload = cargarNotas;
    </script>

</body>
</html>
